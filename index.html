<h1>Převodník měn</h1>

<form id="prevodnik">
    <input type="number" id="castka" min="0" placeholder="Zadej částku">

    <select id="from">
        <option value="CZK">CZK</option>
        <option value="EUR">EUR</option>
        <option value="USD">USD</option>
        <option value="PLN">PLN</option>
    </select>

    <select id="to">
        <option value="EUR">EUR</option>
        <option value="CZK">CZK</option>
        <option value="USD">USD</option>
        <option value="PLN">PLN</option>
    </select>

    <button type="submit">Převést</button>
</form>

<p id="result"></p>
